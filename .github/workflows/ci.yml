name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate-and-test:
    name: Engineering Excellence CI
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout Code repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Validate Prisma Schema & Generate Client
        run: npm run db:validate

      - name: Run ESLint (Zero Warnings Policy)
        run: npm run lint

      - name: Run TypeScript Type Check (Zero Compilation Errors)
        run: npm run typecheck

      - name: Build Backend Service
        run: npm run build:backend

      - name: Build Frontend Application
        run: npm run build:frontend

      - name: Run Unit & Component Tests
        run: npm run test

      - name: Run Backend E2E Integration Tests
        run: npm run test:e2e --workspace=backend
